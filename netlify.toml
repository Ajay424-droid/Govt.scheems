[build]
  base = "."
  publish = "react/dist"
  command = "cd node && npm install && cd ../react && npm install && npm run build"

[functions]
  external_node_modules = ["pg"]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
